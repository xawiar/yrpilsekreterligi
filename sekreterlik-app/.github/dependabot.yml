version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/sekreterlik-app/client"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "client"

  - package-ecosystem: "npm"
    directory: "/sekreterlik-app/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "server"
